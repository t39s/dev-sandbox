<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <title>YouTube — таймер паузы</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #000;
      color: #fff;
      overflow: hidden;
    }

    button, input { font: inherit; }

    .setup {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: max(24px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
      background: #111;
    }

    .card {
      width: min(100%, 560px);
      display: grid;
      gap: 18px;
    }

    h1 {
      margin: 0 0 4px;
      font-size: clamp(26px, 7vw, 38px);
      line-height: 1.05;
    }

    .hint {
      margin: 0;
      color: #aaa;
      line-height: 1.45;
    }

    label {
      display: grid;
      gap: 8px;
      font-weight: 600;
    }

    input {
      width: 100%;
      min-height: 52px;
      border: 1px solid #444;
      border-radius: 12px;
      background: #202020;
      color: #fff;
      padding: 12px 14px;
      outline: none;
      font-size: 17px;
    }

    input:focus { border-color: #fff; }

    .primary {
      min-height: 54px;
      border: 0;
      border-radius: 12px;
      background: #fff;
      color: #000;
      font-weight: 750;
      cursor: pointer;
    }

    .error {
      min-height: 1.4em;
      margin: 0;
      color: #ff8c8c;
      font-size: 14px;
    }

    .player-screen {
      position: fixed;
      inset: 0;
      display: none;
      background: #000;
      overflow: hidden;
    }

    .player-screen.active { display: block; }

    #player,
    #player iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .timer {
      position: absolute;
      z-index: 5;
      top: max(10px, env(safe-area-inset-top));
      right: max(10px, env(safe-area-inset-right));
      min-width: 82px;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(0, 0, 0, .68);
      border: 1px solid rgba(255,255,255,.28);
      text-align: center;
      font-variant-numeric: tabular-nums;
      font-weight: 750;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      pointer-events: none;
    }

    .back {
      position: absolute;
      z-index: 6;
      top: max(10px, env(safe-area-inset-top));
      left: max(10px, env(safe-area-inset-left));
      width: 44px;
      height: 44px;
      border: 1px solid rgba(255,255,255,.28);
      border-radius: 999px;
      background: rgba(0,0,0,.68);
      color: #fff;
      font-size: 24px;
      line-height: 1;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .expired {
      position: absolute;
      z-index: 7;
      inset: 0;
      display: none;
      place-items: center;
      padding: 24px;
      background: rgba(0,0,0,.62);
      text-align: center;
    }

    .expired.visible { display: grid; }

    .expired-panel {
      width: min(100%, 420px);
      padding: 24px;
      border: 1px solid rgba(255,255,255,.28);
      border-radius: 18px;
      background: rgba(15,15,15,.92);
    }

    .expired h2 { margin: 0 0 10px; font-size: 30px; }
    .expired p { margin: 0 0 18px; color: #bbb; }

    .expired button {
      width: 100%;
      min-height: 50px;
      border: 0;
      border-radius: 12px;
      background: #fff;
      color: #000;
      font-weight: 750;
    }
  </style>
</head>
<body>
  <main id="setup" class="setup">
    <form id="form" class="card" novalidate>
      <div>
        <h1>YouTube с таймером паузы</h1>
        <p class="hint">Видео остановится после заданного времени фактического воспроизведения.</p>
      </div>

      <label>
        Адрес видео на YouTube
        <input id="videoUrl" type="url" inputmode="url" autocomplete="url" placeholder="https://youtu.be/…" required>
      </label>

      <label>
        Пауза, секунд
        <input id="pauseSeconds" type="number" inputmode="numeric" min="1" step="1" value="60" required>
      </label>

      <button class="primary" type="submit">Показать видео</button>
      <p id="error" class="error" role="alert" aria-live="polite"></p>
    </form>
  </main>

  <section id="playerScreen" class="player-screen" aria-label="Видеоплеер">
    <div id="player"></div>
    <button id="back" class="back" type="button" aria-label="Вернуться к настройкам">×</button>
    <div id="timer" class="timer" aria-live="off">01:00</div>

    <div id="expired" class="expired" role="dialog" aria-modal="true" aria-labelledby="expiredTitle">
      <div class="expired-panel">
        <h2 id="expiredTitle">Время истекло</h2>
        <p>Видео поставлено на паузу.</p>
        <button id="continue" type="button">Продолжить ещё раз</button>
      </div>
    </div>
  </section>

  <script>
    (() => {
      'use strict';

      const form = document.getElementById('form');
      const setup = document.getElementById('setup');
      const screen = document.getElementById('playerScreen');
      const error = document.getElementById('error');
      const timerEl = document.getElementById('timer');
      const expiredEl = document.getElementById('expired');
      const backBtn = document.getElementById('back');
      const continueBtn = document.getElementById('continue');

      let player = null;
      let pendingVideoId = '';
      let durationMs = 60000;
      let remainingMs = durationMs;
      let deadline = 0;
      let intervalId = null;
      let expired = false;
      let apiReady = false;

      function extractVideoId(raw) {
        const value = raw.trim();
        if (/^[A-Za-z0-9_-]{11}$/.test(value)) return value;

        let url;
        try {
          url = new URL(value);
        } catch {
          return null;
        }

        const host = url.hostname.replace(/^www\./, '').toLowerCase();
        let id = null;

        if (host === 'youtu.be') {
          id = url.pathname.split('/').filter(Boolean)[0];
        } else if (host === 'youtube.com' || host === 'm.youtube.com' || host === 'music.youtube.com') {
          if (url.pathname === '/watch') id = url.searchParams.get('v');
          else {
            const parts = url.pathname.split('/').filter(Boolean);
            if (['embed', 'shorts', 'live'].includes(parts[0])) id = parts[1];
          }
        }

        return id && /^[A-Za-z0-9_-]{11}$/.test(id) ? id : null;
      }

      function formatTime(ms) {
        const seconds = Math.max(0, Math.ceil(ms / 1000));
        const minutes = Math.floor(seconds / 60);
        const rest = seconds % 60;
        return `${String(minutes).padStart(2, '0')}:${String(rest).padStart(2, '0')}`;
      }

      function renderTimer() {
        timerEl.textContent = formatTime(remainingMs);
      }

      function stopTicking() {
        if (intervalId !== null) {
          clearInterval(intervalId);
          intervalId = null;
        }
      }

      function syncRemaining() {
        if (!deadline) return;
        remainingMs = Math.max(0, deadline - Date.now());
        renderTimer();
        if (remainingMs <= 0) expireTimer();
      }

      function startTicking() {
        if (expired || remainingMs <= 0 || intervalId !== null) return;
        deadline = Date.now() + remainingMs;
        intervalId = window.setInterval(syncRemaining, 200);
        syncRemaining();
      }

      function pauseTicking() {
        if (intervalId !== null) syncRemaining();
        stopTicking();
        deadline = 0;
      }

      function expireTimer() {
        if (expired) return;
        expired = true;
        remainingMs = 0;
        renderTimer();
        stopTicking();
        deadline = 0;

        try { player?.pauseVideo(); } catch (_) {}
        expiredEl.classList.add('visible');
      }

      function resetTimer() {
        stopTicking();
        expired = false;
        remainingMs = durationMs;
        deadline = 0;
        expiredEl.classList.remove('visible');
        renderTimer();
      }

      function createOrLoadPlayer(videoId) {
        if (!apiReady) {
          pendingVideoId = videoId;
          return;
        }

        if (player && typeof player.loadVideoById === 'function') {
          player.loadVideoById(videoId);
          return;
        }

        player = new YT.Player('player', {
          width: '100%',
          height: '100%',
          videoId,
          playerVars: {
            autoplay: 1,
            controls: 1,
            playsinline: 1,
            rel: 0,
            fs: 0,
            origin: location.origin === 'null' ? undefined : location.origin
          },
          events: {
            onReady(event) {
              // В Safari автозапуск со звуком может быть заблокирован.
              // Пользователь в таком случае запускает видео штатной кнопкой YouTube.
              try { event.target.playVideo(); } catch (_) {}
            },
            onStateChange(event) {
              if (event.data === YT.PlayerState.PLAYING) startTicking();
              else pauseTicking();
            },
            onAutoplayBlocked() {
              pauseTicking();
            },
            onError() {
              error.textContent = 'YouTube не смог загрузить это видео. Проверьте ссылку и разрешение на встраивание.';
            }
          }
        });
      }

      async function tryPageFullscreen() {
        const request = screen.requestFullscreen || screen.webkitRequestFullscreen;
        if (!request) return;
        try { await request.call(screen); } catch (_) {}
      }

      form.addEventListener('submit', (event) => {
        event.preventDefault();
        error.textContent = '';

        const videoId = extractVideoId(document.getElementById('videoUrl').value);
        const seconds = Number(document.getElementById('pauseSeconds').value);

        if (!videoId) {
          error.textContent = 'Введите корректную ссылку YouTube или идентификатор видео.';
          return;
        }
        if (!Number.isFinite(seconds) || seconds < 1) {
          error.textContent = 'Пауза должна быть целым числом не меньше 1 секунды.';
          return;
        }

        durationMs = Math.round(seconds) * 1000;
        resetTimer();
        setup.hidden = true;
        screen.classList.add('active');
        createOrLoadPlayer(videoId);
        tryPageFullscreen();
      });

      backBtn.addEventListener('click', async () => {
        pauseTicking();
        try { player?.pauseVideo(); } catch (_) {}
        screen.classList.remove('active');
        setup.hidden = false;
        expiredEl.classList.remove('visible');

        if (document.fullscreenElement || document.webkitFullscreenElement) {
          try {
            const exit = document.exitFullscreen || document.webkitExitFullscreen;
            await exit?.call(document);
          } catch (_) {}
        }
      });

      continueBtn.addEventListener('click', () => {
        resetTimer();
        try { player?.playVideo(); } catch (_) {}
      });

      document.addEventListener('visibilitychange', () => {
        // setInterval может быть заморожен в фоне. Расчёт через Date.now()
        // восстанавливает корректное оставшееся время после возврата.
        if (!document.hidden && intervalId !== null) syncRemaining();
      });

      window.onYouTubeIframeAPIReady = () => {
        apiReady = true;
        if (pendingVideoId) {
          const id = pendingVideoId;
          pendingVideoId = '';
          createOrLoadPlayer(id);
        }
      };

      const apiScript = document.createElement('script');
      apiScript.src = 'https://www.youtube.com/iframe_api';
      apiScript.async = true;
      document.head.appendChild(apiScript);

      renderTimer();
    })();
  </script>
</body>
</html>
