<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f5f5f5">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#111111">
  <title>Случайное число</title>

  <style>
    :root {
      color-scheme: light dark;
      --background: #f5f5f5;
      --foreground: #111111;
      --button-background: #111111;
      --button-foreground: #ffffff;
      --button-active: #303030;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --background: #111111;
        --foreground: #f5f5f5;
        --button-background: #f5f5f5;
        --button-foreground: #111111;
        --button-active: #d5d5d5;
      }
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      min-height: 100dvh;
      overflow: hidden;
      background: var(--background);
      color: var(--foreground);
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    main {
      width: 100%;
      min-height: 100dvh;
      padding:
        max(24px, env(safe-area-inset-top))
        max(24px, env(safe-area-inset-right))
        max(24px, env(safe-area-inset-bottom))
        max(24px, env(safe-area-inset-left));
      display: grid;
      place-items: center;
    }

    .app {
      width: min(100%, 420px);
      display: grid;
      grid-template-rows: 96px auto;
      gap: 24px;
      align-items: center;
    }

    .result {
      min-height: 96px;
      display: grid;
      place-items: center;
      font-size: clamp(64px, 22vw, 96px);
      font-weight: 700;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      user-select: none;
      will-change: transform, opacity;
    }

    .result.is-updated {
      animation: result-feedback 160ms ease-out;
    }

    button {
      width: 100%;
      min-height: 72px;
      border: 0;
      border-radius: 18px;
      padding: 18px 24px;
      background: var(--button-background);
      color: var(--button-foreground);
      font: inherit;
      font-size: 20px;
      font-weight: 650;
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
      will-change: transform;
    }

    button.is-pressed {
      animation: button-feedback 140ms ease-out;
    }

    button:focus-visible {
      outline: 3px solid currentColor;
      outline-offset: 4px;
    }

    @keyframes result-feedback {
      0% {
        transform: scale(0.86);
        opacity: 0.35;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes button-feedback {
      0% {
        transform: scale(1);
      }

      45% {
        transform: scale(0.96);
        background: var(--button-active);
      }

      100% {
        transform: scale(1);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .result.is-updated {
        animation: result-feedback-reduced 100ms linear;
      }

      button.is-pressed {
        animation: button-feedback-reduced 100ms linear;
      }

      @keyframes result-feedback-reduced {
        0% {
          opacity: 0.4;
        }

        100% {
          opacity: 1;
        }
      }

      @keyframes button-feedback-reduced {
        0%,
        100% {
          opacity: 1;
        }

        50% {
          opacity: 0.72;
        }
      }
    }
  </style>
</head>

<body>
  <main>
    <section class="app" aria-label="Генератор случайного числа">
      <output class="result" id="result" aria-live="polite"></output>
      <button id="generateButton" type="button">Случайное число</button>
    </section>
  </main>

  <script>
    const numbers = [2, 5, 10, 20];
    const result = document.getElementById("result");
    const button = document.getElementById("generateButton");

    function restartAnimation(element, className) {
      element.classList.remove(className);
      void element.offsetWidth;
      element.classList.add(className);
    }

    button.addEventListener("click", () => {
      const randomIndex = Math.floor(Math.random() * numbers.length);

      result.textContent = numbers[randomIndex];

      restartAnimation(result, "is-updated");
      restartAnimation(button, "is-pressed");

      if ("vibrate" in navigator) {
        navigator.vibrate(20);
      }
    });

    result.addEventListener("animationend", () => {
      result.classList.remove("is-updated");
    });

    button.addEventListener("animationend", () => {
      button.classList.remove("is-pressed");
    });
  </script>
</body>
</html>
