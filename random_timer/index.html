<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f5f5f5">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#111111">
  <title>Случайный таймер</title>

  <style>
    :root {
      color-scheme: light dark;
      --background: #f5f5f5;
      --foreground: #111111;
      --button-background: #111111;
      --button-foreground: #ffffff;
      --button-active: #303030;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --background: #111111;
        --foreground: #f5f5f5;
        --button-background: #f5f5f5;
        --button-foreground: #111111;
        --button-active: #d5d5d5;
      }
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      min-height: 100dvh;
      overflow: hidden;
      background: var(--background);
      color: var(--foreground);
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    main {
      width: 100%;
      min-height: 100dvh;
      padding:
        max(24px, env(safe-area-inset-top))
        max(24px, env(safe-area-inset-right))
        max(24px, env(safe-area-inset-bottom))
        max(24px, env(safe-area-inset-left));
      display: grid;
      place-items: center;
    }

    .app {
      width: min(100%, 420px);
      display: grid;
      grid-template-rows: 96px auto auto auto auto auto auto auto auto;
      gap: 16px;
      align-items: center;
    }

    .result {
      min-height: 96px;
      display: grid;
      place-items: center;
      font-size: clamp(64px, 22vw, 96px);
      font-weight: 700;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      user-select: none;
      will-change: transform, opacity;
    }

    .result.is-updated {
      animation: result-feedback 160ms ease-out;
    }

    button {
      width: 100%;
      min-height: 72px;
      border: 0;
      border-radius: 18px;
      padding: 18px 24px;
      background: var(--button-background);
      color: var(--button-foreground);
      font: inherit;
      font-size: 20px;
      font-weight: 650;
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
      will-change: transform;
    }

    button.is-pressed {
      animation: button-feedback 140ms ease-out;
    }

    .delay-input-group {
      width: 100%;
      display: grid;
      gap: 6px;
    }

    .delay-input {
      width: 100%;
      min-height: 48px;
      box-sizing: border-box;
      padding: 0 14px;
      border: 1px solid color-mix(in srgb, var(--foreground) 35%, transparent);
      border-radius: 12px;
      background: transparent;
      color: var(--foreground);
      font: inherit;
      font-size: 20px;
      font-weight: 650;
      text-align: center;
    }

    .delay-input:focus-visible {
      outline: 2px solid currentColor;
      outline-offset: 2px;
    }

    .delay-input[aria-invalid="true"] {
      border-color: #b42318;
    }

    .input-message {
      min-height: 1.2em;
      margin: 0;
      font-size: 0.85rem;
      text-align: center;
      opacity: 0.75;
    }

    .signal-button {
      background: transparent;
      color: var(--foreground);
      border: 2px solid currentColor;
    }

    .signal-button.is-active {
      background: #b42318;
      color: #ffffff;
      border-color: #b42318;
    }

    .test-button {
      background: transparent;
      color: var(--foreground);
      border: 1px solid currentColor;
      opacity: 0.88;
    }

    .test-button.is-counting {
      border-style: dashed;
    }

    .test-button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .control-group {
      width: 100%;
      display: grid;
      gap: 8px;
    }

    .control-label-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: baseline;
    }

    .control-group label,
    .control-label-row {
      font-size: 14px;
      font-weight: 600;
      color: var(--foreground);
    }

    .control-group label,
    .control-label-row span:first-child {
      opacity: 0.72;
    }

    .volume-value {
      font-variant-numeric: tabular-nums;
    }

    select {
      width: 100%;
      min-height: 56px;
      border: 1px solid currentColor;
      border-radius: 14px;
      padding: 0 16px;
      background: var(--background);
      color: var(--foreground);
      font: inherit;
      font-size: 17px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--foreground);
    }

    select:focus-visible,
    input[type="range"]:focus-visible,
    button:focus-visible {
      outline: 3px solid currentColor;
      outline-offset: 4px;
    }

    @keyframes result-feedback {
      0% {
        transform: scale(0.86);
        opacity: 0.35;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes button-feedback {
      0% {
        transform: scale(1);
      }

      45% {
        transform: scale(0.96);
        background: var(--button-active);
      }

      100% {
        transform: scale(1);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .result.is-updated {
        animation: result-feedback-reduced 100ms linear;
      }

      button.is-pressed {
        animation: button-feedback-reduced 100ms linear;
      }

      @keyframes result-feedback-reduced {
        0% {
          opacity: 0.4;
        }

        100% {
          opacity: 1;
        }
      }

      @keyframes button-feedback-reduced {
        0%,
        100% {
          opacity: 1;
        }

        50% {
          opacity: 0.72;
        }
      }
    }
  
    main {
      min-height: 100dvh;
      padding: 0;
      display: block;
    }

    .app {
      position: relative;
      width: 100%;
      min-height: 100dvh;
    }

    .home-screen {
      position: fixed;
      inset: 0;
      min-height: 100dvh;
      font-size: clamp(32px, 10vmin, 88px);
      --gear-size: 0.72em;
      --gear-hit-size: 1.44em;
      --version-font-size: 0.333em;
    }

    .primary-control {
      width: 100%;
      height: 100%;
      min-height: 100dvh;
      margin: 0;
      padding:
        max(24px, env(safe-area-inset-top))
        max(24px, env(safe-area-inset-right))
        max(24px, env(safe-area-inset-bottom))
        max(24px, env(safe-area-inset-left));
      border-radius: 0;
      font-size: 1em;
      font-weight: 700;
      line-height: 1;
    }

    .primary-control.is-stopping {
      border-style: dashed;
    }

    .primary-control.is-active {
      background: #b42318;
      color: #ffffff;
      border-color: #b42318;
    }

    .primary-control.is-stopping {
      color: #b42318;
      border-color: #b42318;
      background: #000000;
    }

    .settings-toggle {
      position: fixed;
      right: max(16px, env(safe-area-inset-right));
      bottom: max(16px, env(safe-area-inset-bottom));
      z-index: 2;
      width: var(--gear-hit-size);
      height: var(--gear-hit-size);
      min-width: var(--gear-hit-size);
      min-height: var(--gear-hit-size);
      padding: 0;
      display: grid;
      place-items: center;
      border: 0;
      border-radius: 50%;
      background: transparent;
      color: var(--button-foreground);
      font: inherit;
      line-height: 1;
    }

    .settings-icon {
      display: block;
      width: var(--gear-size);
      height: var(--gear-size);
      fill: currentColor;
    }

    .home-version {
      position: fixed;
      left: max(16px, env(safe-area-inset-left));
      bottom: max(16px, env(safe-area-inset-bottom));
      z-index: 2;
      margin: 0;
      font-size: var(--version-font-size);
      line-height: 1.2;
      color: var(--button-foreground);
      opacity: 0.55;
      pointer-events: none;
      user-select: none;
    }

    .settings-toggle .settings-label {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (orientation: landscape) {
      .home-screen {
        font-size: clamp(28px, 10vmin, 72px);
      }
    }

    .settings-panel {
      position: fixed;
      inset: 0;
      z-index: 10;
      min-height: 100dvh;
      overflow-y: auto;
      background: var(--background);
      color: var(--foreground);
      padding:
        max(16px, env(safe-area-inset-top))
        20px
        max(20px, env(safe-area-inset-bottom));
      box-sizing: border-box;
    }

    .settings-header {
      width: min(100%, 420px);
      margin: 0 auto 20px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
    }

    .settings-header h2 {
      margin: 0;
      font-size: 24px;
    }

    .settings-close {
      min-height: 44px;
      width: auto;
      padding-inline: 18px;
      background: #b42318;
      color: #ffffff;
      border-color: #b42318;
    }

    .settings-content {
      width: min(100%, 420px);
      margin: 0 auto;
      display: grid;
      gap: 14px;
      padding-bottom: 24px;
    }

    .version-label {
      font-size: 12px;
      line-height: 1.2;
      text-align: center;
      opacity: 0.55;
      padding-bottom: env(safe-area-inset-bottom);
    }

  </style>
</head>

<body>
  <main>
    <section class="app" aria-label="Случайный таймер">
      <section class="home-screen" aria-label="Главный экран">
        <button
          class="primary-control"
          id="primaryControl"
          type="button"
        >
          Включить
        </button>

        <button
          class="settings-toggle"
          id="settingsToggle"
          type="button"
          aria-label="Открыть настройки"
          aria-expanded="false"
          aria-controls="settingsPanel"
        >
          <svg
            class="settings-icon"
            viewBox="0 0 64 64"
            aria-hidden="true"
          >
            <mask id="gear-mask">
              <rect width="64" height="64" fill="white"></rect>
              <circle cx="32" cy="32" r="13.2" fill="black"></circle>
            </mask>
            <g fill="currentColor" mask="url(#gear-mask)">
              <rect x="26" y="2" width="12" height="16" rx="4"></rect>
              <rect x="26" y="2" width="12" height="16" rx="4" transform="rotate(45 32 32)"></rect>
              <rect x="26" y="2" width="12" height="16" rx="4" transform="rotate(90 32 32)"></rect>
              <rect x="26" y="2" width="12" height="16" rx="4" transform="rotate(135 32 32)"></rect>
              <rect x="26" y="2" width="12" height="16" rx="4" transform="rotate(180 32 32)"></rect>
              <rect x="26" y="2" width="12" height="16" rx="4" transform="rotate(225 32 32)"></rect>
              <rect x="26" y="2" width="12" height="16" rx="4" transform="rotate(270 32 32)"></rect>
              <rect x="26" y="2" width="12" height="16" rx="4" transform="rotate(315 32 32)"></rect>

              <circle cx="32" cy="32" r="22"></circle>
            </g>
          </svg>
          <span class="settings-label">Настройки</span>
        </button>

        <p class="home-version">Версия 0.5.2a</p>
      </section>

      <section
        class="settings-panel"
        id="settingsPanel"
        aria-label="Настройки и отладка"
        hidden
      >
        <div class="settings-header">
          <h2>Настройки</h2>
          <button
            class="settings-close"
            id="settingsClose"
            type="button"
          >
            Назад
          </button>
        </div>

        <div class="settings-content">
          <output class="result" id="result" aria-live="polite"></output>

          <div class="delay-input-group">
            <input
              class="delay-input"
              id="delayInput"
              type="text"
              inputmode="text"
              autocomplete="off"
              autocapitalize="off"
              spellcheck="false"
              aria-describedby="delayMessage"
              value="2s, 5s, 10s, 20s"
            >
            <p class="input-message" id="delayMessage" aria-live="polite"></p>
          </div>

          <button id="generateButton" type="button">Случайная задержка</button>

          <button
            class="signal-button"
            id="signalButton"
            type="button"
            aria-pressed="false"
          >
            Включить сигнал
          </button>

          <button
            class="test-button"
            id="testButton"
            type="button"
            aria-describedby="testStatus"
          >
            Тест (5 секунд)
          </button>

          <button
            class="test-button"
            id="randomTestButton"
            type="button"
            aria-describedby="testStatus"
          >
            Тест (случайно)
          </button>

          <span id="testStatus" aria-live="polite" hidden></span>

          <div class="control-group">
            <label for="signalSelect">Сигнал</label>
            <select id="signalSelect">
              <option value="steady">Ровный тон</option>
              <option value="low">Низкий гул</option>
              <option value="dual">Двойной тон</option>
              <option value="siren">Сирена</option>
              <option value="pulse">Пульс</option>
            </select>
          </div>

          <div class="control-group">
            <div class="volume-row">
              <label for="volumeControl">Громкость</label>
              <output id="volumeValue" for="volumeControl">30%</output>
            </div>
            <input
              id="volumeControl"
              type="range"
              min="0"
              max="100"
              step="1"
              value="30"
            >
          </div>
          <footer class="version-label">Версия 0.5.2a</footer>
        </div>
      </section>
    </section>
  </main>

  <script>
    const primaryControl = document.getElementById("primaryControl");
    const settingsToggle = document.getElementById("settingsToggle");
    const settingsClose = document.getElementById("settingsClose");
    const settingsPanel = document.getElementById("settingsPanel");
    const result = document.getElementById("result");
    const button = document.getElementById("generateButton");
    const delayInput = document.getElementById("delayInput");
    const delayMessage = document.getElementById("delayMessage");
    const signalButton = document.getElementById("signalButton");
    const testButton = document.getElementById("testButton");
    const randomTestButton = document.getElementById("randomTestButton");
    const testStatus = document.getElementById("testStatus");
    const signalSelect = document.getElementById("signalSelect");
    const volumeControl = document.getElementById("volumeControl");
    const volumeValue = document.getElementById("volumeValue");

    const savedSignal = localStorage.getItem("random_timer.signal");
    const savedVolume = localStorage.getItem("random_timer.volume");

    if (savedSignal && [...signalSelect.options].some(option => option.value === savedSignal)) {
      signalSelect.value = savedSignal;
    }

    if (savedVolume !== null && !Number.isNaN(Number(savedVolume))) {
      const restoredVolume = Math.min(100, Math.max(0, Number(savedVolume)));
      volumeControl.value = String(restoredVolume);
    }

    volumeValue.textContent = `${volumeControl.value}%`;

    let selectedVolume = Number(volumeControl.value) / 100;
    let signalLevel = 1;

    let audioContext = null;
    let oscillator = null;
    let gainNode = null;
    let modulationOscillator = null;
    let modulationGain = null;
    let pulseTimer = null;
    let dualToneTimer = null;
    let testTimeout = null;
    let countdownTimer = null;
    let testPending = false;
    let activeTestButton = null;
    let signalEnabled = false;

    function restartAnimation(element, className) {
      element.classList.remove(className);
      void element.offsetWidth;
      element.classList.add(className);
    }

    function updatePrimaryControl() {
      primaryControl.classList.remove("is-stopping", "is-active");

      if (signalEnabled) {
        primaryControl.textContent = "Выключить";
        primaryControl.classList.add("is-active");
        primaryControl.setAttribute("aria-label", "Выключить сигнал");
        return;
      }

      if (testPending) {
        primaryControl.textContent = "Остановить";
        primaryControl.classList.add("is-stopping");
        primaryControl.setAttribute("aria-label", "Остановить отсчёт");
        return;
      }

      primaryControl.textContent = "Включить";
      primaryControl.setAttribute(
        "aria-label",
        "Включить случайный таймер"
      );
    }

    function getDefaultTestLabel(buttonElement) {
      return buttonElement === randomTestButton
        ? "Тест (случайно)"
        : "Тест (5 секунд)";
    }

    function setTestButtonState() {
      const testButtons = [testButton, randomTestButton];

      testButtons.forEach(buttonElement => {
        buttonElement.disabled = signalEnabled;
        buttonElement.classList.toggle(
          "is-counting",
          testPending && buttonElement === activeTestButton
        );

        if (signalEnabled) {
          buttonElement.textContent = "Тест недоступен";
        } else if (!testPending || buttonElement !== activeTestButton) {
          buttonElement.textContent = getDefaultTestLabel(buttonElement);
        }
      });

      updatePrimaryControl();
    }

    function cancelTest() {
      if (testTimeout) {
        clearTimeout(testTimeout);
        testTimeout = null;
      }

      if (countdownTimer) {
        clearInterval(countdownTimer);
        countdownTimer = null;
      }

      testPending = false;
      activeTestButton = null;
      testStatus.textContent = "Тест отменён";
      setTestButtonState();
    }

    async function startTest(delaySeconds, buttonElement = null) {
      if (testPending) {
        cancelTest();
      }

      audioContext ??= new AudioContext();
      if (audioContext.state === "suspended") {
        await audioContext.resume();
      }

      testPending = true;
      activeTestButton = buttonElement;
      let remaining = delaySeconds;

      if (buttonElement) {
        buttonElement.textContent = `Отменить тест: ${remaining} с`;
      }

      testStatus.textContent =
        `Сигнал включится через ${remaining} секунд`;
      setTestButtonState();

      countdownTimer = setInterval(() => {
        remaining -= 1;

        if (remaining > 0) {
          if (activeTestButton) {
            activeTestButton.textContent =
              `Отменить тест: ${remaining} с`;
          }

          testStatus.textContent =
            `Сигнал включится через ${remaining} секунд`;
        }
      }, 1000);

      testTimeout = setTimeout(async () => {
        if (countdownTimer) {
          clearInterval(countdownTimer);
          countdownTimer = null;
        }

        testTimeout = null;
        testPending = false;
        activeTestButton = null;
        testStatus.textContent = "Сигнал включён";
        await startSignal();
      }, delaySeconds * 1000);
    }

    const DELAYS_STORAGE_KEY = "random_timer.delays";
    const DEFAULT_DELAYS = "2s, 5s, 10s, 20s";

    function parseDelayToken(token) {
      const normalized = token.trim().toLowerCase();
      const match = normalized.match(/^(?:(\d+)m)?(?:(\d+)s)?$/);

      if (!match || (!match[1] && !match[2])) {
        return null;
      }

      const minutes = Number(match[1] || 0);
      const seconds = Number(match[2] || 0);
      const totalSeconds = minutes * 60 + seconds;

      if (!Number.isSafeInteger(totalSeconds) || totalSeconds <= 0) {
        return null;
      }

      return {
        source: token.trim(),
        totalSeconds
      };
    }

    function parseDelayList(value) {
      const tokens = value.split(",").map(token => token.trim());

      if (!tokens.length || tokens.some(token => token === "")) {
        return {
          ok: false,
          invalidToken: ""
        };
      }

      const parsed = [];

      for (const token of tokens) {
        const delay = parseDelayToken(token);

        if (!delay) {
          return {
            ok: false,
            invalidToken: token
          };
        }

        parsed.push(delay);
      }

      return {
        ok: true,
        values: parsed
      };
    }

    function restoreDelayInput() {
      const saved = localStorage.getItem(DELAYS_STORAGE_KEY);
      delayInput.value = saved || DEFAULT_DELAYS;
    }

    function saveDelayInput() {
      localStorage.setItem(DELAYS_STORAGE_KEY, delayInput.value);
    }

    delayInput.addEventListener("input", () => {
      saveDelayInput();
      delayInput.setAttribute("aria-invalid", "false");
      delayMessage.textContent = "";
    });

    button.addEventListener("click", () => {
      const parsed = parseDelayList(delayInput.value);

      if (!parsed.ok) {
        delayInput.setAttribute("aria-invalid", "true");
        delayMessage.textContent = parsed.invalidToken
          ? `Некорректное значение: ${parsed.invalidToken}`
          : "Проверьте формат задержек";
        result.textContent = "";
        return;
      }

      const selected =
        parsed.values[Math.floor(Math.random() * parsed.values.length)];

      result.textContent = selected.source;
      delayInput.setAttribute("aria-invalid", "false");
      delayMessage.textContent = "";

      restartAnimation(result, "is-updated");
      restartAnimation(button, "is-pressed");

      if ("vibrate" in navigator) {
        navigator.vibrate(20);
      }
    });

    restoreDelayInput();

    function clearSignalNodes() {
      if (pulseTimer) {
        clearInterval(pulseTimer);
        pulseTimer = null;
      }

      if (dualToneTimer) {
        clearInterval(dualToneTimer);
        dualToneTimer = null;
      }

      if (modulationOscillator) {
        try {
          modulationOscillator.stop();
        } catch {}
        modulationOscillator = null;
      }

      modulationGain = null;

      if (oscillator) {
        try {
          oscillator.stop();
        } catch {}
        oscillator = null;
      }

      gainNode = null;
    }

    function effectiveVolume() {
      return selectedVolume * signalLevel;
    }

    function applyVolume(target = effectiveVolume()) {
      if (!gainNode || !audioContext) {
        return;
      }

      const now = audioContext.currentTime;
      gainNode.gain.cancelScheduledValues(now);
      gainNode.gain.setTargetAtTime(target, now, 0.015);
    }

    function createBaseSignal(type, frequency, level = 1) {
      signalLevel = level;
      oscillator = audioContext.createOscillator();
      gainNode = audioContext.createGain();

      oscillator.type = type;
      oscillator.frequency.value = frequency;

      gainNode.gain.setValueAtTime(0, audioContext.currentTime);
      gainNode.gain.linearRampToValueAtTime(
        effectiveVolume(),
        audioContext.currentTime + 0.05
      );

      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);
      oscillator.start();
    }

    function buildSelectedSignal() {
      clearSignalNodes();

      switch (signalSelect.value) {
        case "low":
          createBaseSignal("triangle", 220, 0.75);
          break;

        case "dual":
          createBaseSignal("sine", 660, 0.7);
          dualToneTimer = setInterval(() => {
            if (!oscillator || !audioContext) {
              return;
            }

            const nextFrequency = oscillator.frequency.value < 800 ? 990 : 660;
            oscillator.frequency.setTargetAtTime(
              nextFrequency,
              audioContext.currentTime,
              0.015
            );
          }, 280);
          break;

        case "siren":
          createBaseSignal("sine", 700, 0.65);
          modulationOscillator = audioContext.createOscillator();
          modulationGain = audioContext.createGain();

          modulationOscillator.type = "sine";
          modulationOscillator.frequency.value = 0.8;
          modulationGain.gain.value = 350;

          modulationOscillator.connect(modulationGain);
          modulationGain.connect(oscillator.frequency);
          modulationOscillator.start();
          break;

        case "pulse":
          createBaseSignal("sine", 880, 0);
          signalLevel = 0.8;
          pulseTimer = setInterval(() => {
            const now = audioContext.currentTime;
            gainNode.gain.cancelScheduledValues(now);
            gainNode.gain.setValueAtTime(0, now);
            gainNode.gain.linearRampToValueAtTime(effectiveVolume(), now + 0.02);
            gainNode.gain.linearRampToValueAtTime(0, now + 0.22);
          }, 700);

          {
            const now = audioContext.currentTime;
            gainNode.gain.setValueAtTime(0, now);
            gainNode.gain.linearRampToValueAtTime(effectiveVolume(), now + 0.02);
            gainNode.gain.linearRampToValueAtTime(0, now + 0.22);
          }
          break;

        case "steady":
        default:
          createBaseSignal("sine", 880, 0.8);
      }
    }

    async function startSignal() {
      audioContext ??= new AudioContext();

      if (audioContext.state === "suspended") {
        await audioContext.resume();
      }

      buildSelectedSignal();

      signalEnabled = true;
      signalButton.textContent = "Выключить сигнал";
      signalButton.classList.add("is-active");
      signalButton.setAttribute("aria-pressed", "true");
      setTestButtonState();
    }

    function stopSignal() {
      if (audioContext && gainNode) {
        const now = audioContext.currentTime;
        gainNode.gain.cancelScheduledValues(now);
        gainNode.gain.setValueAtTime(gainNode.gain.value, now);
        gainNode.gain.linearRampToValueAtTime(0, now + 0.05);
      }

      setTimeout(() => {
        if (!signalEnabled) {
          clearSignalNodes();
        }
      }, 70);

      signalEnabled = false;
      signalButton.textContent = "Включить сигнал";
      signalButton.classList.remove("is-active");
      signalButton.setAttribute("aria-pressed", "false");
      setTestButtonState();
    }

    function openSettings() {
      settingsPanel.hidden = false;
      settingsToggle.setAttribute("aria-expanded", "true");
      settingsPanel.scrollTop = 0;
      document.body.style.overflow = "hidden";
    }

    function closeSettings() {
      settingsPanel.hidden = true;
      settingsToggle.setAttribute("aria-expanded", "false");
      document.body.style.overflow = "";
    }

    settingsToggle.addEventListener("click", openSettings);
    settingsClose.addEventListener("click", closeSettings);

    primaryControl.addEventListener("click", async () => {
      restartAnimation(primaryControl, "is-pressed");

      if (signalEnabled) {
        stopSignal();
      } else if (testPending) {
        cancelTest();
      } else {
        const parsed = parseDelayList(delayInput.value);

        if (!parsed.ok) {
          delayInput.setAttribute("aria-invalid", "true");
          delayMessage.textContent = parsed.invalidToken
            ? `Некорректное значение: ${parsed.invalidToken}`
            : "Проверьте формат задержек";

          openSettings();
          return;
        }

        const selected =
          parsed.values[Math.floor(Math.random() * parsed.values.length)];

        result.textContent = selected.source;
        delayInput.setAttribute("aria-invalid", "false");
        delayMessage.textContent = "";

        restartAnimation(result, "is-updated");
        await startTest(selected.totalSeconds);
      }

      if ("vibrate" in navigator) {
        navigator.vibrate(20);
      }
    });

    signalButton.addEventListener("click", async () => {
      restartAnimation(signalButton, "is-pressed");

      if (testPending) {
        cancelTest();
      }

      if (signalEnabled) {
        stopSignal();
      } else {
        await startSignal();
      }

      if ("vibrate" in navigator) {
        navigator.vibrate(20);
      }
    });

    testButton.addEventListener("click", async () => {
      restartAnimation(testButton, "is-pressed");

      if (testPending && activeTestButton === testButton) {
        cancelTest();
        return;
      }

      await startTest(5, testButton);

      if ("vibrate" in navigator) {
        navigator.vibrate(20);
      }
    });

    randomTestButton.addEventListener("click", async () => {
      restartAnimation(randomTestButton, "is-pressed");

      if (testPending && activeTestButton === randomTestButton) {
        cancelTest();
        return;
      }

      const parsed = parseDelayList(delayInput.value);

      if (!parsed.ok) {
        delayInput.setAttribute("aria-invalid", "true");
        delayMessage.textContent = parsed.invalidToken
          ? `Некорректное значение: ${parsed.invalidToken}`
          : "Проверьте формат задержек";
        return;
      }

      const selected =
        parsed.values[Math.floor(Math.random() * parsed.values.length)];

      result.textContent = selected.source;
      delayInput.setAttribute("aria-invalid", "false");
      delayMessage.textContent = "";

      restartAnimation(result, "is-updated");

      await startTest(selected.totalSeconds, randomTestButton);

      if ("vibrate" in navigator) {
        navigator.vibrate(20);
      }
    });

    signalSelect.addEventListener("change", () => {
      localStorage.setItem("random_timer.signal", signalSelect.value);

      if (signalEnabled) {
        buildSelectedSignal();
      }
    });

    volumeControl.addEventListener("input", () => {
      selectedVolume = Number(volumeControl.value) / 100;
      volumeValue.textContent = `${volumeControl.value}%`;
      localStorage.setItem("random_timer.volume", volumeControl.value);

      if (signalEnabled && signalSelect.value !== "pulse") {
        applyVolume();
      }
    });

    result.addEventListener("animationend", () => {
      result.classList.remove("is-updated");
    });

    button.addEventListener("animationend", () => {
      button.classList.remove("is-pressed");
    });

    signalButton.addEventListener("animationend", () => {
      signalButton.classList.remove("is-pressed");
    });

    testButton.addEventListener("animationend", () => {
      testButton.classList.remove("is-pressed");
    });

    randomTestButton.addEventListener("animationend", () => {
      randomTestButton.classList.remove("is-pressed");
    });

    primaryControl.addEventListener("animationend", () => {
      primaryControl.classList.remove("is-pressed");
    });

    setTestButtonState();
    updatePrimaryControl();
  </script>
</body>
</html>
