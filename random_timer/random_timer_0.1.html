<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f5f5f5">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#111111">
  <title>Случайное число</title>

  <style>
    :root {
      color-scheme: light dark;
      --background: #f5f5f5;
      --foreground: #111111;
      --button-background: #111111;
      --button-foreground: #ffffff;
      --button-active: #303030;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --background: #111111;
        --foreground: #f5f5f5;
        --button-background: #f5f5f5;
        --button-foreground: #111111;
        --button-active: #d5d5d5;
      }
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      min-height: 100dvh;
      overflow: hidden;
      background: var(--background);
      color: var(--foreground);
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    main {
      width: 100%;
      min-height: 100dvh;
      padding:
        max(24px, env(safe-area-inset-top))
        max(24px, env(safe-area-inset-right))
        max(24px, env(safe-area-inset-bottom))
        max(24px, env(safe-area-inset-left));
      display: grid;
      place-items: center;
    }

    .app {
      width: min(100%, 420px);
      display: grid;
      grid-template-rows: 96px auto;
      gap: 24px;
      align-items: center;
    }

    .result {
      min-height: 96px;
      display: grid;
      place-items: center;
      font-size: clamp(64px, 22vw, 96px);
      font-weight: 700;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      user-select: none;
    }

    button {
      width: 100%;
      min-height: 72px;
      border: 0;
      border-radius: 18px;
      padding: 18px 24px;
      background: var(--button-background);
      color: var(--button-foreground);
      font: inherit;
      font-size: 20px;
      font-weight: 650;
      cursor: pointer;
      touch-action: manipulation;
      transition: transform 80ms ease, background-color 80ms ease;
    }

    button:active {
      transform: scale(0.98);
      background: var(--button-active);
    }

    button:focus-visible {
      outline: 3px solid currentColor;
      outline-offset: 4px;
    }
  </style>
</head>

<body>
  <main>
    <section class="app" aria-label="Генератор случайного числа">
      <output class="result" id="result" aria-live="polite"></output>
      <button id="generateButton" type="button">Случайное число</button>
    </section>
  </main>

  <script>
    const numbers = [2, 5, 10, 20];
    const result = document.getElementById("result");
    const button = document.getElementById("generateButton");

    button.addEventListener("click", () => {
      const randomIndex = Math.floor(Math.random() * numbers.length);
      result.textContent = numbers[randomIndex];
    });
  </script>
</body>
</html>
